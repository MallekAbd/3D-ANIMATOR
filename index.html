<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Animator — Ergonomic Assessment</title>
  <link rel="icon" href="favicon.ico">
  <style>
    @font-face {
      font-family: 'Lato';
      src: url('assets/lato-light.woff2') format('woff2');
      font-weight: 300;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Lato', 'Segoe UI', system-ui, sans-serif;
      font-weight: 300;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    h1 {
      font-size: 17px;
      font-weight: 400;
      color: #58a6ff;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    h1 small {
      color: #7d8590;
      font-size: 11px;
      letter-spacing: 0;
      margin-left: 6px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      flex: 1;
    }

    select#input {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }

    select#input:hover { border-color: #58a6ff; }

    .divider {
      width: 1px;
      height: 20px;
      background: #30363d;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
      color: #8b949e;
      font-size: 13px;
      transition: color 0.15s;
    }

    label:hover { color: #e6edf3; }

    input[type="checkbox"] {
      accent-color: #58a6ff;
      cursor: pointer;
      width: 13px;
      height: 13px;
    }

    #highlight {
      background: #388bfd22;
      color: #58a6ff;
      border: 1px solid #388bfd55;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      letter-spacing: 0.5px;
      visibility: hidden;
    }

    #status {
      background: #0d1117;
      color: #7d8590;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 4px 20px;
      border-bottom: 1px solid #21262d;
      min-height: 24px;
      flex-shrink: 0;
      white-space: pre;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #status.error { color: #f85149; }

    .canvas-container {
      display: flex;
      flex: 1;
      min-height: 0;
      gap: 1px;
      background: #21262d;
    }

    .canvas-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    .canvas-label {
      position: absolute;
      top: 8px;
      left: 10px;
      font-size: 10px;
      color: #7d8590;
      letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
    }

    canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Video preview: small inset bottom-left of overlay canvas */
    #video {
      position: absolute;
      bottom: 8px;
      left: 8px;
      width: 160px;
      height: auto;
      border: 1px solid #30363d;
      border-radius: 4px;
      z-index: 20;
      background: #000;
      display: none; /* shown via JS once loaded */
    }

    #file-input { display: none; }

    #hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #484f58;
      font-size: 12px;
      text-align: center;
      line-height: 1.8;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>3D Animator <small>ergonomic assessment</small></h1>
    <div class="controls">
      <select id="input"></select>
      <input type="file" id="file-input" accept="video/*">

      <div class="checkbox-group">
        <label><input type="checkbox" id="face"> Face</label>
        <label><input type="checkbox" id="body"> Body</label>
        <label><input type="checkbox" id="hand"> Hand</label>
      </div>

      <div class="divider"></div>

      <div class="checkbox-group">
        <label><input type="checkbox" id="points"> Points</label>
        <label><input type="checkbox" id="outlines" checked> Outlines</label>
        <label><input type="checkbox" id="meshes"> Meshes</label>
      </div>

      <div class="divider"></div>

      <div class="checkbox-group">
        <label><input type="checkbox" id="wireframe"> Wireframe</label>
        <label><input type="checkbox" id="smooth" checked> Smooth</label>
      </div>

      <span id="highlight">face detected</span>
    </div>
  </header>

  <pre id="status">loading engine (this may take 30–60 s on first visit)…</pre>

  <div class="canvas-container">
    <div class="canvas-wrapper" id="overlay-wrapper">
      <span class="canvas-label">2D Overlay</span>
      <canvas id="output-overlay"></canvas>
      <!-- video preview inset (shown once a source is selected) -->
      <video id="video" autoplay muted playsinline></video>
      <div id="hint">← Select an input source above<br>then enable Face / Body / Hand</div>
    </div>
    <div class="canvas-wrapper">
      <span class="canvas-label">3D Scene</span>
      <canvas id="output-mesh"></canvas>
    </div>
  </div>

  <input type="file" id="file-input" accept="video/*" style="display:none">

  <!-- Error display & auto-play fix (runs before the main module) -->
  <script>
    // Surface any JS errors in the status bar so they're visible
    window.addEventListener('error', function(e) {
      var s = document.getElementById('status');
      if (s) { s.innerText = 'JS error: ' + e.message; s.className = 'error'; }
    });
    window.addEventListener('unhandledrejection', function(e) {
      var s = document.getElementById('status');
      if (s) { s.innerText = 'Error: ' + (e.reason && e.reason.message || e.reason); s.className = 'error'; }
    });

    // Auto-play video when any source is loaded (samples, uploads)
    // Uses addEventListener so it doesn't conflict with the compiled app's onloadeddata handler
    var _vid = document.getElementById('video');
    _vid.addEventListener('loadeddata', function() {
      this.style.display = 'block';               // show the preview inset
      document.getElementById('hint').style.display = 'none';
      this.play().catch(function() {});            // start playback → triggers detection loop
    });
    _vid.addEventListener('play', function() {
      this.style.display = 'block';
      document.getElementById('hint').style.display = 'none';
    });
  </script>

  <script type="module" src="dist/index.js"></script>
</body>
</html>
